name: proofuck-native-parser
on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-native-compiler:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Setup Environment and Patch Interpreter for Binary Output
      run: python -c "content=open('bootstrap/main.py').read(); content=content.replace('sys.stdout.write(chr(self.tape[self.pointer]))', 'sys.stdout.buffer.write(bytes([self.tape[self.pointer]]))'); open('bootstrap/main.py','w').write('import sys\nsys.set_int_max_str_digits(0)\n' + content)"
    - name: Restore Stage 2 Native Compiler
      run: cat src/transpiler.bf <(printf '\0') > input.bf && python bootstrap/main.py src/transpiler.prf < input.bf > compiler.c && gcc -O3 compiler.c -o bf_compiler.elf && chmod +x bf_compiler.elf
    - name: Generate ELF POC BF Script
      run: python -c "import sys; h='7f454c4602010100000000000000000002003e0001000000780040000000000040000000000000000000000000000000000000004000380001000000000000000100000005000000000000000000000000004000000000000000400000000000890000000000000089000000000000000010000000000000b83c000000bf2a0000000f05'; b=bytes.fromhex(h); sys.stdout.write(''.join(['>'+'+'*(x//10)+'[<++++++++++>-]<'+'+'*(x%10)+'.[-]' for x in b]))" > src/elf_poc.bf
    - name: Convert POC to PRF
      run: python tools/reverse_generator.py "$(cat src/elf_poc.bf)" > src/elf_poc.prf
    - name: Output Pure ELF Binary via Proofuck VM
      run: python bootstrap/main.py src/elf_poc.prf > proofuck_pure.elf
    - name: Test Executing Pure ELF
      run: chmod +x proofuck_pure.elf && ./proofuck_pure.elf || if [ $? -eq 42 ]; then echo "SUCCESS! Native ELF executed with code 42"; else echo "FAILED with code $?"; exit 1; fi
    - name: Commit Changes
      run: git config --global user.name "github-actions[bot]" && git config --global user.email "github-actions[bot]@users.noreply.github.com" && git add src/elf_poc.bf src/elf_poc.prf && git diff --staged --quiet || (git commit -m "feat: Proof of Concept Pure ELF Output" && git push)
