name: proofuck-elf-test
on: [push, pull_request]
jobs:
  test-elf:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Generate ELF Header PRF
      run: |
        python -c "print('>++++++++++[<++++++++++++>-]<+++++++.>>++++++++++[<+++++++>-]<-.>>++++++++++[<++++++++>-]<----.>>++++++++++[<+++++++>-]<.')" > elf.bf
        python tools/reverse_generator.py "$(cat elf.bf)" > elf.prf
    - name: Run Tests
      run: |
        # 実行してバイナリファイルとして出力
        python bootstrap/main.py elf.prf > output.bin
        
        # 出力されたバイナリの先頭4バイトを16進数（Hex）で読み取る
        HEX=$(python -c 'print(open("output.bin","rb").read()[:4].hex())')
        echo "Output Hex: $HEX"
        
        if [ "$HEX" != "7f454c46" ]; then 
          echo "Error: Magic number mismatch!"
          exit 1
        fi
        
        echo "ELF Magic Number test passed!"
        exit 0
