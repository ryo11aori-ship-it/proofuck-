name: proofuck-dec-test
on: [push, pull_request]
jobs:
  test-dec:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Generate Decimal Extractor PRF
      run: |
        python -c "print(',>++++++[<-------->-]<[>++++++++++<-]>[-<+>]<>,[-],-------------------------------------------------->>+<<[<-[--->>+<<]>>>-<<-]>>[<<<[-->>+<<]>>>-]<>++++++[<++++++++>-]<.')" > dec.bf
        python tools/reverse_generator.py "$(cat dec.bf)" > dec.prf
    - name: Run Tests
      run: |
        echo -n "1/2" > input1.txt
        RES1=$(python bootstrap/main.py dec.prf < input1.txt)
        echo "Input: 1/2, Output: 0.$RES1"
        if [ "$RES1" != "5" ]; then exit 1; fi
        
        echo -n "1/3" > input2.txt
        RES2=$(python bootstrap/main.py dec.prf < input2.txt)
        echo "Input: 1/3, Output: 0.$RES2"
        if [ "$RES2" != "3" ]; then exit 1; fi
        
        echo "Decimal Extractor test passed!"
        exit 0
