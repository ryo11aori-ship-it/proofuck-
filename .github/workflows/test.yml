name: proofuck-multidigit-atoi-test
on: [push, pull_request]
jobs:
  test-multidigit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Generate Multi-digit Atoi PRF
      run: |
        python -c "print('>[-]<,----------[--------------------------------------<[>>+<<-]>>[<<++++++++++>>-]<[<+>-],----------]<.')" > multidigit.bf
        python tools/reverse_generator.py "$(cat multidigit.bf)" > multidigit.prf
    - name: Run Tests
      run: |
        echo "65" > input1.txt
        RES1=$(python bootstrap/main.py multidigit.prf < input1.txt)
        echo "Input: 65, Output: $RES1"
        if [ "$RES1" != "A" ]; then exit 1; fi
        
        echo "89" > input2.txt
        RES2=$(python bootstrap/main.py multidigit.prf < input2.txt)
        echo "Input: 89, Output: $RES2"
        if [ "$RES2" != "Y" ]; then exit 1; fi
        
        echo "122" > input3.txt
        RES3=$(python bootstrap/main.py multidigit.prf < input3.txt)
        echo "Input: 122, Output: $RES3"
        if [ "$RES3" != "z" ]; then exit 1; fi
        
        echo "Multi-digit Atoi test passed!"
        exit 0
