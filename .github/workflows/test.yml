name: proofuck-var-to-c-test
on: [push, pull_request]
jobs:
  test-var-c:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Generate Proofuck Variable Transpiler PRF
      run: |
        python -c "print(',>,>,>+++++[>++++++++<-]>++.[-]<+++++++[>++++++++++++++++<-]>.[-]<++++++[>++++++++++<-]>+.[-]<<.>++++++[>++++++++++<-]>-.[-]<')" > var_c.bf
        python tools/reverse_generator.py "$(cat var_c.bf)" > var_c.prf
    - name: Run Tests
      run: |
        echo -n "x=5" > input1.txt
        RES1=$(python bootstrap/main.py var_c.prf < input1.txt)
        echo "Input: x=5, Output: $RES1"
        if [ "$RES1" != "*p=5;" ]; then exit 1; fi
        
        echo -n "y=9" > input2.txt
        RES2=$(python bootstrap/main.py var_c.prf < input2.txt)
        echo "Input: y=9, Output: $RES2"
        if [ "$RES2" != "*p=9;" ]; then exit 1; fi
        
        echo "Proofuck Var to C test passed!"
        exit 0
