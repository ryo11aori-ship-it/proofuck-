name: proofuck-var-assign-test
on: [push, pull_request]
jobs:
  test-var-assign:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Generate Var Assign PRF
      run: |
        python -c "print(',,>[-]<,----------[--------------------------------------<[>>+<<-]>>[<<++++++++++>>-]<[<+>-],----------]<.')" > var_assign.bf
        python tools/reverse_generator.py "$(cat var_assign.bf)" > var_assign.prf
    - name: Run Tests
      run: |
        echo "x=65" > input1.txt
        RES1=$(python bootstrap/main.py var_assign.prf < input1.txt)
        echo "Input: x=65, Output: $RES1"
        if [ "$RES1" != "A" ]; then exit 1; fi
        echo "y=89" > input2.txt
        RES2=$(python bootstrap/main.py var_assign.prf < input2.txt)
        echo "Input: y=89, Output: $RES2"
        if [ "$RES2" != "Y" ]; then exit 1; fi
        echo "z=122" > input3.txt
        RES3=$(python bootstrap/main.py var_assign.prf < input3.txt)
        echo "Input: z=122, Output: $RES3"
        if [ "$RES3" != "z" ]; then exit 1; fi
        echo "Var Assign test passed!"
        exit 0
