name: proofuck-native-parser
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: patch_env_and_optimize
        run: |
          cat << 'EOF' > patch_env.py
          import re
          with open('bootstrap/main.py', 'r', encoding='utf-8') as f: c = f.read()
          
          # 1. バイナリ出力対応
          c = c.replace('sys.stdout.write(chr(self.tape[self.pointer]))', 'sys.stdout.buffer.write(bytes([self.tape[self.pointer]]))')
          
          # 2. パフォーマンス最適化
          old_calc = "            eval_val = IntraBlockEvaluator.evaluate(expression, self.var_manager.var_map)\n            extracted_str = DecimalExtractor.extract(eval_val, start_digit, end_digit)\n            blocks_results.append(extracted_str)"
          new_calc = "            ckey = (expression, start_digit, end_digit)\n            if ckey not in block_cache:\n                eval_val = IntraBlockEvaluator.evaluate(expression, self.var_manager.var_map)\n                block_cache[ckey] = DecimalExtractor.extract(eval_val, start_digit, end_digit)\n            blocks_results.append(block_cache[ckey])"
          c = c.replace("        for match in matches:", "        block_cache = {}\n        for match in matches:")
          c = c.replace(old_calc, new_calc)
          new_eval = "    @staticmethod\n    def evaluate(blocks: list, operators: list) -> str:\n        if not blocks: return \"\"\n        nb = [blocks[0]]\n        no = []\n        for i, op in enumerate(operators):\n            if op == '×': nb[-1] = InterBlockStringMath._pad_and_calculate(nb[-1], blocks[i+1], '×')\n            else: nb.append(blocks[i+1]); no.append(op)\n        res = nb[0]\n        for i, op in enumerate(no): res = InterBlockStringMath._pad_and_calculate(res, nb[i+1], op)\n        return res"
          c = re.sub(r'    @staticmethod\s+def evaluate\(blocks: list, operators: list\) -> str:.*?return blocks\[0\] if blocks else ""', new_eval, c, flags=re.DOTALL)
          
          # 3. 入力をバイナリセーフにする (ELFの挙動と完全一致させる)
          head = "import sys\nsys.stdin = open(sys.stdin.fileno(), 'r', encoding='latin1', closefd=False)\nsys.set_int_max_str_digits(0)\n"
          with open('bootstrap/main.py', 'w', encoding='utf-8') as f: f.write(head + c)
          
          # 素数ジェネレータの高速化
          with open('tools/reverse_generator.py', 'r', encoding='utf-8') as f: cr = f.read()
          target_str = "p=lambda n:n>1 and all(n%i!=0 for i in range(2,int(n**0.5)+1));gp=lambda m:next(x for x in I.count(m) if p(x) and x not in u and not u.add(x));fxy=lambda v:next((x,y) for y in (gp(100) for _ in I.count()) for x in range(max(2,v*y),v*y+y) if p(x) and x not in u and not u.add(x))"
          new_str = """
          p=lambda n:n>1 and all(n%i!=0 for i in range(2,int(n**0.5)+1))
          def gen_p():
              n=100
              while True:
                  if p(n) and n not in u: yield n
                  n+=1
          P_ITER = gen_p()
          def fxy(v):
              while True:
                  y = next(P_ITER)
                  u.add(y)
                  for x in range(max(2,v*y), v*y+y):
                      if p(x) and x not in u:
                          u.add(x)
                          return (x,y)
          pass"""
          cr = cr.replace(target_str, new_str.strip())
          cr = cr.replace('src=sys.argv[1] if len(sys.argv)>1 else', 'src=open(sys.argv[1]).read() if len(sys.argv)>1 else')
          cr = cr.replace('eq="+".join(', 'eq="+\\n".join(')
          with open('tools/reverse_generator.py', 'w', encoding='utf-8') as f: f.write(cr)
          EOF
          python patch_env.py

      - name: build_lightweight_parser
        run: |
          cat << 'EOF' > tools/gen_parser.py
          # ∵ (E2 88 B5) を1バイトずつ検証
          bf = "+ > " # flag = 1, ptr at 1
          for b in [226, 136, 181]:
              bf += ", " + "-" * b + " [ < [-] > [-] ] "
          bf += "< " # move to flag
          
          # 堅牢なIF-ELSE分岐
          bf += "> + < " # cell1=1, ptr at 0
          bf += "[ > - < [-] > ++++++++ [ < ++++++++++ > - ] < - . ] " # if flag=1: print 'O' (79)
          bf += "> [ - > +++++++++ [ < ++++++++++ > - ] < - - . ]" # if flag=0: print 'X' (88)
          
          with open("src/front_parser.bf", "w") as f: f.write(bf)
          EOF
          python tools/gen_parser.py
          python tools/reverse_generator.py src/front_parser.bf > src/front_parser.prf

      - name: test_proofuck_syntax_parser
        run: |
          echo -n "∵" > test_syntax.txt
          python bootstrap/main.py src/front_parser.prf < test_syntax.txt > parser_out.txt
          RES=$(cat parser_out.txt)
          if [ "$RES" = "O" ]; then 
            echo "SUCCESS: Parsed '∵' correctly natively on Proofuck!"
          else 
            echo "FAILED: $RES"
            exit 1
          fi

      - name: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/front_parser.bf src/front_parser.prf tools/reverse_generator.py
          git diff --staged --quiet || (git commit -m "fix: Proofuck syntax parser with robust IF-ELSE & binary safe IO" && git push)
