name: proofuck-native-parser
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: patch_interpreter
        run: |
          cat << 'EOF' > patch.py
          with open('bootstrap/main.py', 'r') as f:
              c = f.read()
          c = c.replace('sys.stdout.write(chr(self.tape[self.pointer]))', 'sys.stdout.buffer.write(bytes([self.tape[self.pointer]]))')
          with open('bootstrap/main.py', 'w') as f:
              f.write('import sys\nsys.set_int_max_str_digits(0)\n' + c)
          EOF
          python patch.py
      - name: compile_stage2
        run: |
          printf '\0' > null.bin
          cat src/transpiler.bf null.bin > input.bf
          python bootstrap/main.py src/transpiler.prf < input.bf > compiler.c
          gcc -O3 compiler.c -o bf_compiler.elf
          chmod +x bf_compiler.elf
      - name: generate_elf_poc
        run: |
          cat << 'EOF' > make_poc.py
          import sys
          h = '7f454c4602010100000000000000000002003e0001000000780040000000000040000000000000000000000000000000000000004000380001000000000000000100000005000000000000000000000000004000000000000000400000000000890000000000000089000000000000000010000000000000b83c000000bf2a0000000f05'
          b = bytes.fromhex(h)
          sys.stdout.write(''.join(['>'+'+'*(x//10)+'[<++++++++++>-]<'+'+'*(x%10)+'.[-]' for x in b]))
          EOF
          python make_poc.py > src/elf_poc.bf
          python tools/reverse_generator.py "$(cat src/elf_poc.bf)" > src/elf_poc.prf
      - name: execute_and_test_pure_elf
        run: |
          python bootstrap/main.py src/elf_poc.prf > proofuck_pure.elf
          chmod +x proofuck_pure.elf
          ./proofuck_pure.elf || RES=$?
          if [ "$RES" = "42" ]; then
            echo "SUCCESS: Native ELF executed with code 42"
          else
            echo "FAILED: Exit code $RES"
            exit 1
          fi
      - name: commit_poc_files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/elf_poc.bf src/elf_poc.prf
          git diff --staged --quiet || (git commit -m "feat: Pure ELF POC via Proofuck" && git push)
