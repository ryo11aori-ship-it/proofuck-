name: proofuck-bootstrap
on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Disable Python Integer Limit
      run: |
        python -c "content=open('bootstrap/main.py').read(); open('bootstrap/main.py','w').write('import sys\nsys.set_int_max_str_digits(0)\n' + content)"

    - name: Setup Full AOT Transpiler Generator
      run: |
        cat << 'EOF' > tools/gen_transpiler.py
        import sys
        P = lambda s: "".join([">++++++++++[<"+"+"*(ord(c)//10)+">-]<"+"+"*(ord(c)%10)+".[-]" for c in s])
        H = "#include <stdio.h>\nint main(){unsigned char m[300000]={0};unsigned char *p=m;\n"
        F = "return 0;}\n"
        out = P(H) + ",[[>+>>+>>+>>+>>+>>+>>+>>+<<<<<<<<<<<<<<<-]>"
        out += "-"*43 + ">+<[>[-]<[-]]>[[-]<" + P("++*p;") + ">]<<"
        out += ">>>" + "-"*45 + ">+<[>[-]<[-]]>[[-]<" + P("--*p;") + ">]<<<<"
        out += ">>>>>" + "-"*62 + ">+<[>[-]<[-]]>[[-]<" + P("++p;") + ">]<<<<<<"
        out += ">>>>>>>" + "-"*60 + ">+<[>[-]<[-]]>[[-]<" + P("--p;") + ">]<<<<<<<<"
        out += ">>>>>>>>>" + "-"*46 + ">+<[>[-]<[-]]>[[-]<" + P("putchar(*p);") + ">]<<<<<<<<<<"
        out += ">>>>>>>>>>>" + "-"*44 + ">+<[>[-]<[-]]>[[-]<" + P("*p=getchar();") + ">]<<<<<<<<<<<<"
        out += ">>>>>>>>>>>>>" + "-"*91 + ">+<[>[-]<[-]]>[[-]<" + P("while(*p){") + ">]<<<<<<<<<<<<<<"
        out += ">>>>>>>>>>>>>>>" + "-"*93 + ">+<[>[-]<[-]]>[[-]<" + P("}") + ">]<<<<<<<<<<<<<<<<"
        out += ",]" + P(F)
        sys.stdout.write(out)
        EOF
        
    - name: Generate Source Files
      run: |
        python tools/gen_transpiler.py > src/transpiler.bf
        python tools/reverse_generator.py "$(cat src/transpiler.bf)" > src/transpiler.prf
        # EOF無限ループ回避のため、末尾にヌルバイトを付与した入力用ソースを作成
        cat src/transpiler.bf <(printf '\0') > input_source.bf
        
    - name: Phase 1 - Compile Compiler via Python (Stage 1)
      run: |
        echo "--- Python VM compiling transpiler.bf to C ---"
        python bootstrap/main.py src/transpiler.prf < input_source.bf > stage1.c
        gcc -O3 stage1.c -o compiler_stage1.elf
        chmod +x compiler_stage1.elf
        echo "Stage 1 Native Compiler Created!"
        
    - name: Phase 2 - Compiler Compiles Itself! (Stage 2)
      run: |
        echo "--- NATIVE Compiler compiling transpiler.bf to C ---"
        ./compiler_stage1.elf < input_source.bf > stage2.c
        gcc -O3 stage2.c -o compiler_stage2.elf
        chmod +x compiler_stage2.elf
        echo "Stage 2 Native Compiler Created!"
        
    - name: Phase 3 - The Ouroboros Verification
      run: |
        echo "--- Comparing Stage 1 and Stage 2 C source code ---"
        if diff stage1.c stage2.c; then
          echo "SUCCESS: The compiler perfectly compiled itself!"
          echo "We are now 100% FREE from Python dependency!"
        else
          echo "ERROR: Stage 1 and Stage 2 outputs differ."
          exit 1
        fi
        
    - name: Commit Stage 1 Compiler to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # ネイティブコンパイラ（ソースとバイナリ）を保存
        git add tools/gen_transpiler.py src/transpiler.bf src/transpiler.prf
        if ! git diff --staged --quiet; then
          git commit -m "feat: Python-independent Native Compiler (Stage 2)"
          git push
        else
          echo "No changes to commit."
        fi
