name: proofuck-bootstrap
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 1. Setup Full AOT Transpiler Generator
      run: |
        cat << 'EOF' > tools/gen_transpiler.py
        import sys
        P = lambda s: "".join(["+"*ord(c)+".[-]" for c in s])
        H = "#include <stdio.h>\nint main(){unsigned char m[30000]={0};unsigned char *p=m;\n"
        F = "return 0;}\n"
        out = P(H) + ",[>+>>+>>+>>+>>+>>+>>+>>+<<<<<<<<<<<<<<<-]>"
        out += "-"*43 + ">+<[>[-]<[-]]>[[-]<" + P("++*p;") + ">]<<"
        out += ">>>" + "-"*45 + ">+<[>[-]<[-]]>[[-]<" + P("--*p;") + ">]<<<<"
        out += ">>>>>" + "-"*62 + ">+<[>[-]<[-]]>[[-]<" + P("++p;") + ">]<<<<<<"
        out += ">>>>>>>" + "-"*60 + ">+<[>[-]<[-]]>[[-]<" + P("--p;") + ">]<<<<<<<<"
        out += ">>>>>>>>>" + "-"*46 + ">+<[>[-]<[-]]>[[-]<" + P("putchar(*p);") + ">]<<<<<<<<<<"
        out += ">>>>>>>>>>>" + "-"*44 + ">+<[>[-]<[-]]>[[-]<" + P("*p=getchar();") + ">]<<<<<<<<<<<<"
        out += ">>>>>>>>>>>>>" + "-"*91 + ">+<[>[-]<[-]]>[[-]<" + P("while(*p){") + ">]<<<<<<<<<<<<<<"
        out += ">>>>>>>>>>>>>>>" + "-"*93 + ">+<[>[-]<[-]]>[[-]<" + P("}") + ">]<<<<<<<<<<<<<<<<"
        out += ",]" + P(F)
        sys.stdout.write(out)
        EOF
        
    - name: 2. Generate and Compile Transpiler
      run: |
        echo "--- Generating BF source ---"
        python tools/gen_transpiler.py > src/transpiler.bf
        echo "--- Compiling to PRF ---"
        python tools/reverse_generator.py "$(cat src/transpiler.bf)" > src/transpiler.prf
        
    - name: 3. E2E Test: Compile "OK" Program to Native Binary!
      run: |
        # 「OK」という文字を出力するBrainfuckコードを作成
        echo -n "+++++[>+++++++++++++++<-]>++++.>----." > program.bf
        
        echo "--- Transpiling to C via Proofuck ---"
        python bootstrap/main.py src/transpiler.prf < program.bf > program.c
        
        echo "--- Compiling C to Native ELF via GCC ---"
        gcc -O3 program.c -o program.elf
        chmod +x program.elf
        
        echo "--- Executing Native Binary! ---"
        RES=$(./program.elf)
        echo "Execution Result: $RES"
        
        if [ "$RES" != "OK" ]; then
          echo "Error: Binary failed to output OK!"
          exit 1
        fi
        echo "NATIVE COMPILATION COMPLETE!!! We reached the Pure Spaces level!"
        
    - name: 4. Commit and Push to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add tools/gen_transpiler.py src/transpiler.bf src/transpiler.prf
        if ! git diff --staged --quiet; then
          git commit -m "feat: complete AOT transpiler architecture"
          git push
        else
          echo "No changes to commit."
        fi
