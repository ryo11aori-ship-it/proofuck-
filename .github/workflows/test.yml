name: proofuck-bootstrap
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: 1. Setup Architecture & Flat Generator
      run: |
        # ディレクトリ構造の作成
        mkdir -p tools src tests
        
        # インデントエラーが絶対に起きない、平坦なジェネレータスクリプトを生成
        cat << 'EOF' > tools/gen_transpiler.py
        import sys;
        b=',[>+>>+>>+>>+<<<<<<<-]>'+'-'*43+'>+<[>[-]<[-]]>[[-]<'+'+'*43+'..-.'+'+'*70+'.'+'-'*53+'.[-]>]<<>>>'+'-'*45+'>+<[>[-]<[-]]>[[-]<'+'+'*45+'..---.'+'+'*70+'.'+'-'*53+'.[-]>]<<<<>>>>>'+'-'*62+'>+<[>[-]<[-]]>[[-]<'+'+'*43+'..'+'+'*69+'.'+'-'*53+'.[-]>]<<<<<<>>>>>>>'+'-'*60+'>+<[>[-]<[-]]>[[-]<'+'+'*45+'..'+'+'*67+'.'+'-'*53+'.[-]>]<<<<<<<<';
        sys.stdout.write(b*100);
        EOF
        
    - name: 2. Generate and Compile Transpiler
      run: |
        echo "--- Generating BF source ---"
        python tools/gen_transpiler.py > src/transpiler.bf
        
        echo "--- Compiling to PRF (This may take a few seconds) ---"
        python tools/reverse_generator.py "$(cat src/transpiler.bf)" > src/transpiler.prf
        
    - name: 3. Sanity Check Test
      run: |
        echo -n "+>-<" > input.txt
        RES=$(python bootstrap/main.py src/transpiler.prf < input.txt)
        echo "Input: +>-<, Output: $RES"
        if [ "$RES" != "++*p;++p;--*p;--p;" ]; then exit 1; fi
        echo "Sanity Check Passed!"
        
    - name: 4. Commit and Push to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add tools/gen_transpiler.py src/transpiler.bf src/transpiler.prf
        if ! git diff --staged --quiet; then
          git commit -m "chore: bootstrap proofuck transpiler architecture"
          git push
        else
          echo "No changes to commit."
        fi
