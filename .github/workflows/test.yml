name: proofuck-div-test
on: [push, pull_request]
jobs:
  test-div:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Generate Division PRF
      run: |
        python -c "print(',>++++++[<-------->-]<>,[-]>,>++++++[<-------->-]<[>+>+<<-]>>[-<<+>>]<<>-->+<[>[-]<[-]]>[[-]<<<<[-->>>>>+<<<<<]>>>>]<<[>>>>+>+<<<<<-]>>>>>[-<<<<<+>>>>>]<<<<<>>>>--->+<[>[-]<[-]]>[[-]<<<<<<<[--->>>>>+<<<<<]>>>>>>>]<<>++++++[<++++++++>-]<.')" > div.bf
        python tools/reverse_generator.py "$(cat div.bf)" > div.prf
    - name: Run Tests
      run: |
        echo -n "8/2" > input1.txt
        RES1=$(python bootstrap/main.py div.prf < input1.txt)
        echo "Input: 8/2, Output: $RES1"
        if [ "$RES1" != "4" ]; then exit 1; fi
        
        echo -n "6/3" > input2.txt
        RES2=$(python bootstrap/main.py div.prf < input2.txt)
        echo "Input: 6/3, Output: $RES2"
        if [ "$RES2" != "2" ]; then exit 1; fi
        
        echo "Division test passed!"
        exit 0
