name: proofuck-native-parser
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: setup_env
        run: |
          cat << 'EOF' > patch_env.py
          with open('bootstrap/main.py', 'r', encoding='utf-8') as f: c = f.read()
          c = c.replace('sys.stdout.write(chr(self.tape[self.pointer]))', 'sys.stdout.buffer.write(bytes([self.tape[self.pointer]]))')
          with open('bootstrap/main.py', 'w', encoding='utf-8') as f: f.write('import sys\nsys.set_int_max_str_digits(0)\n' + c)
          with open('tools/reverse_generator.py', 'r', encoding='utf-8') as f: c = f.read()
          c = c.replace('eq="+".join(', 'eq="+\\n".join(')
          with open('tools/reverse_generator.py', 'w', encoding='utf-8') as f: f.write(c)
          EOF
          python patch_env.py
      - name: build_native_compiler
        run: |
          cat << 'EOF' > tools/gen_native_compiler.py
          import sys
          P = lambda s: "".join([">++++++++++[<"+"+"*(c//10)+">-]<"+"+"*(c%10)+".[-]" for c in s])
          H_hex = "7f454c4602010100000000000000000002003e0001000000780040000000000040000000000000000000000000000000000000004000380001000000000000000100000007000000000000000000000000004000000000000000400000000000000001000000000000000100000000000010000000000000"
          S_hex = "4881ec307500004989e44c89e748c7c13075000030c0f3aa"
          E_hex = "b83c00000031ff0f05"
          out = P(bytes.fromhex(H_hex + S_hex)) + ",[[>+>>+>>+>>+>>+>>+<<<<<<<<<<<-]>"
          out += "-"*43 + ">+<[>[-]<[-]]>[[-]<" + P(bytes.fromhex("41fe0424")) + ">]<<"
          out += ">>>" + "-"*45 + ">+<[>[-]<[-]]>[[-]<" + P(bytes.fromhex("41fe0c24")) + ">]<<<<"
          out += ">>>>>" + "-"*62 + ">+<[>[-]<[-]]>[[-]<" + P(bytes.fromhex("49ffc4")) + ">]<<<<<<"
          out += ">>>>>>>" + "-"*60 + ">+<[>[-]<[-]]>[[-]<" + P(bytes.fromhex("49ffec")) + ">]<<<<<<<<"
          out += ">>>>>>>>>" + "-"*46 + ">+<[>[-]<[-]]>[[-]<" + P(bytes.fromhex("b801000000bf010000004c89e6ba010000000f05")) + ">]<<<<<<<<<<"
          out += ">>>>>>>>>>>" + "-"*44 + ">+<[>[-]<[-]]>[[-]<" + P(bytes.fromhex("b800000000bf000000004c89e6ba010000000f05")) + ">]<<<<<<<<<<<<"
          out += ",]" + P(bytes.fromhex(E_hex))
          sys.stdout.write(out)
          EOF
          python tools/gen_native_compiler.py > src/native_compiler.bf
          python tools/reverse_generator.py "$(cat src/native_compiler.bf)" > src/native_compiler.prf
      - name: test_compiler
        run: |
          echo -n "+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++." > test_linear.bf
          python bootstrap/main.py src/native_compiler.prf < test_linear.bf > output.elf
          chmod +x output.elf
          RES=$(./output.elf)
          if [ "$RES" = "A" ]; then echo "SUCCESS: Generated ELF works!"; else echo "FAILED: $RES"; exit 1; fi
      - name: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/gen_native_compiler.py src/native_compiler.bf src/native_compiler.prf tools/reverse_generator.py
          git diff --staged --quiet || (git commit -m "feat: Pure Native ELF Compiler (Phase 1)" && git push)
