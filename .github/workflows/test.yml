name: proofuck-syntax-test
on: [push, pull_request]
jobs:
  test-syntax:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Generate Syntax Checker PRF
      run: |
        python -c "print('+>,++++++++++++++++++++++++++++++[<[-]>[-]]>,++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++[<<[-]>>[-]]>,+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++[<<<[-]>>>[-]]<<<[>>++++++++[<++++++++++>-]<-.----.[-]<[-]]')" > checker.bf
        python tools/reverse_generator.py "$(cat checker.bf)" > syntax.prf
    - name: Run Syntax Checker Test
      run: |
        python -c "print('\xe2\x88\xb5', end='')" > valid.txt
        python -c "print('x=53', end='')" > invalid.txt
        RES_VALID=$(python bootstrap/main.py syntax.prf < valid.txt)
        echo "Valid output: $RES_VALID"
        if [ "$RES_VALID" != "OK" ]; then exit 1; fi
        RES_INVALID=$(python bootstrap/main.py syntax.prf < invalid.txt)
        echo "Invalid output: $RES_INVALID"
        if [ "$RES_INVALID" != "" ]; then exit 1; fi
        echo "Syntax checker passed!"
        exit 0
