name: proofuck-bootstrap
on:
  push:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Disable Python Integer Limit (Unleash Proofuck)
      run: |
        python -c "content=open('bootstrap/main.py').read(); open('bootstrap/main.py','w').write('import sys\nsys.set_int_max_str_digits(0)\n' + content)"

    - name: Setup Full AOT Transpiler Generator
      run: |
        cat << 'EOF' > tools/gen_transpiler.py
        import sys
        P = lambda s: "".join(["+"*ord(c)+".[-]" for c in s])
        H = "#include <stdio.h>\nint main(){unsigned char m[30000]={0};unsigned char *p=m;\n"
        F = "return 0;}\n"
        out = P(H) + ",[>+>>+>>+>>+>>+>>+>>+>>+<<<<<<<<<<<<<<<-]>"
        out += "-"*43 + ">+<[>[-]<[-]]>[[-]<" + P("++*p;") + ">]<<"
        out += ">>>" + "-"*45 + ">+<[>[-]<[-]]>[[-]<" + P("--*p;") + ">]<<<<"
        out += ">>>>>" + "-"*62 + ">+<[>[-]<[-]]>[[-]<" + P("++p;") + ">]<<<<<<"
        out += ">>>>>>>" + "-"*60 + ">+<[>[-]<[-]]>[[-]<" + P("--p;") + ">]<<<<<<<<"
        out += ">>>>>>>>>" + "-"*46 + ">+<[>[-]<[-]]>[[-]<" + P("putchar(*p);") + ">]<<<<<<<<<<"
        out += ">>>>>>>>>>>" + "-"*44 + ">+<[>[-]<[-]]>[[-]<" + P("*p=getchar();") + ">]<<<<<<<<<<<<"
        out += ">>>>>>>>>>>>>" + "-"*91 + ">+<[>[-]<[-]]>[[-]<" + P("while(*p){") + ">]<<<<<<<<<<<<<<"
        out += ">>>>>>>>>>>>>>>" + "-"*93 + ">+<[>[-]<[-]]>[[-]<" + P("}") + ">]<<<<<<<<<<<<<<<<"
        out += ",]" + P(F)
        sys.stdout.write(out)
        EOF
        
    - name: Generate and Compile Transpiler
      run: |
        python tools/gen_transpiler.py > src/transpiler.bf
        python tools/reverse_generator.py "$(cat src/transpiler.bf)" > src/transpiler.prf
        
    - name: E2E Test - Compile OK Program to Native Binary
      run: |
        echo -n "+++++[>+++++++++++++++<-]>++++.>----." > program.bf
        
        echo "Transpiling to C via Proofuck..."
        python bootstrap/main.py src/transpiler.prf < program.bf > program.c
        
        echo "Compiling C to Native ELF via GCC..."
        gcc -O3 program.c -o program.elf
        chmod +x program.elf
        
        echo "Executing Native Binary!"
        RES=$(./program.elf)
        echo "Execution Result: $RES"
        
        if [ "$RES" != "OK" ]; then
          echo "Error: Binary failed to output OK!"
          exit 1
        fi
        echo "NATIVE COMPILATION COMPLETE!!!"
        
    - name: Commit and Push to Repository
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add tools/gen_transpiler.py src/transpiler.bf src/transpiler.prf
        if ! git diff --staged --quiet; then
          git commit -m "feat: complete AOT transpiler architecture"
          git push
        else
          echo "No changes to commit."
        fi
