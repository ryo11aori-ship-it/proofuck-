name: proofuck-native-parser
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: install_dependencies
        run: sudo apt-get update && sudo apt-get install -y nasm build-essential git

      - name: patch_env_with_performance_fixes
        run: |
          cat << 'EOF' > patch_env.py
          import re
          with open('bootstrap/main.py', 'r', encoding='utf-8') as f: c = f.read()
          c = c.replace('sys.stdout.write(chr(self.tape[self.pointer]))', 'sys.stdout.buffer.write(bytes([self.tape[self.pointer]]))')
          old_calc = "            eval_val = IntraBlockEvaluator.evaluate(expression, self.var_manager.var_map)\n            extracted_str = DecimalExtractor.extract(eval_val, start_digit, end_digit)\n            blocks_results.append(extracted_str)"
          new_calc = "            ckey = (expression, start_digit, end_digit)\n            if ckey not in block_cache:\n                eval_val = IntraBlockEvaluator.evaluate(expression, self.var_manager.var_map)\n                block_cache[ckey] = DecimalExtractor.extract(eval_val, start_digit, end_digit)\n            blocks_results.append(block_cache[ckey])"
          c = c.replace("        for match in matches:", "        block_cache = {}\n        for match in matches:")
          c = c.replace(old_calc, new_calc)
          new_eval = "    @staticmethod\n    def evaluate(blocks: list, operators: list) -> str:\n        if not blocks: return \"\"\n        nb = [blocks[0]]\n        no = []\n        for i, op in enumerate(operators):\n            if op == '×': nb[-1] = InterBlockStringMath._pad_and_calculate(nb[-1], blocks[i+1], '×')\n            else: nb.append(blocks[i+1]); no.append(op)\n        res = nb[0]\n        for i, op in enumerate(no): res = InterBlockStringMath._pad_and_calculate(res, nb[i+1], op)\n        return res"
          c = re.sub(r'    @staticmethod\s+def evaluate\(blocks: list, operators: list\) -> str:.*?return blocks\[0\] if blocks else ""', new_eval, c, flags=re.DOTALL)
          with open('bootstrap/main.py', 'w', encoding='utf-8') as f: f.write('import sys\nsys.set_int_max_str_digits(0)\n' + c)
          with open('tools/reverse_generator.py', 'r', encoding='utf-8') as f: cr = f.read()
          cr = cr.replace('eq="+".join(', 'eq="+\\n".join(')
          with open('tools/reverse_generator.py', 'w', encoding='utf-8') as f: f.write(cr)
          EOF
          python patch_env.py

      - name: setup_elvm_and_build_c_parser
        run: |
          # ELVMの導入と必要なモジュール(8cc, elc)の個別ビルド
          git clone https://github.com/shinh/elvm.git
          cd elvm
          make -C 8cc
          make out/elc
          cd ..
          
          # 超小型のC言語パーサー (入力が 'A' なら '42' を返す)
          cat << 'EOF' > parser.c
          int putchar(int c);
          int getchar(void);
          int main() {
              int c = getchar();
              if (c == 'A') {
                  putchar('4');
                  putchar('2');
              } else {
                  putchar('0');
              }
              return 0;
          }
          EOF
          
          # C -> アセンブリ -> Brainfuck -> Proofuck の変換チェーン
          elvm/8cc/8cc -S parser.c
          elvm/out/elc -bf parser.s > src/front_parser.bf
          python tools/reverse_generator.py "$(cat src/front_parser.bf)" > src/front_parser.prf

      - name: test_c_parser_on_proofuck
        run: |
          echo -n "A" > test_input.txt
          python bootstrap/main.py src/front_parser.prf < test_input.txt > parser_out.txt
          RES=$(cat parser_out.txt)
          if [ "$RES" = "42" ]; then 
            echo "SUCCESS: C Parser successfully running natively on Proofuck!"
          else 
            echo "FAILED: $RES"
            exit 1
          fi

      - name: commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/front_parser.bf src/front_parser.prf
          git diff --staged --quiet || (git commit -m "feat: C-to-Proofuck parser toolchain infrastructure" && git push)
