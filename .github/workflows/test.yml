name: proofuck-native-parser
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: patch_reverse_generator_for_github_display
        run: |
          cat << 'EOF' > patch_rev.py
          with open('tools/reverse_generator.py', 'r', encoding='utf-8') as f:
              c = f.read()
          # スマホのGitHubで表示が切れないよう、+ の結合部分に改行(\n)を挿入
          c = c.replace('eq="+".join(', 'eq="+\\n".join(')
          with open('tools/reverse_generator.py', 'w', encoding='utf-8') as f:
              f.write(c)
          EOF
          python patch_rev.py

      - name: Generate ELF POC BF Script (with visible PRF)
        run: |
          cat << 'EOF' > make_poc.py
          import sys
          h = '7f454c4602010100000000000000000002003e0001000000780040000000000040000000000000000000000000000000000000004000380001000000000000000100000005000000000000000000000000004000000000000000400000000000890000000000000089000000000000000010000000000000b83c000000bf2a0000000f05'
          b = bytes.fromhex(h)
          sys.stdout.write(''.join(['>'+'+'*(x//10)+'[<++++++++++>-]<'+'+'*(x%10)+'.[-]' for x in b]))
          EOF
          python make_poc.py > src/elf_poc.bf
          python tools/reverse_generator.py "$(cat src/elf_poc.bf)" > src/elf_poc.prf

      - name: commit_visible_prf
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/reverse_generator.py src/elf_poc.prf
          git diff --staged --quiet || (git commit -m "fix: Format PRF generator for GitHub Mobile visibility" && git push)
